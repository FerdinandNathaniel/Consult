# =============================================================================
# SOURCE CONFIGURATION
# Add/remove sources freely — each run picks up whatever is listed here.
# Categories are free-form labels used for context in the briefing.
#
# Structure:
#   rss_feeds         — fetched every run (core signal sources)
#   social            — Twitter/X via RSSHub (currently non-functional on rsshub.app)
#   web_sources       — official pages checked for new documents (type=rss treated as feeds)
#   serendipity_sources — curated pool; SERENDIPITY_N (default: 3) are randomly sampled
#                         each run to add variety and surface less obvious sources
# =============================================================================

rss_feeds:

  # --- Dutch / National ---
  - name: "NOS Nieuws - Tech"
    url: "https://feeds.nos.nl/nosnieuwstech"
    category: "national_news"
    language: "nl"

  # FD requires a subscription for RSS access — no public feed available.
  # - name: "Het Financieele Dagblad"
  #   url: "https://fd.nl/rss.xml"
  #   category: "national_news"
  #   language: "nl"

  # DNB moved/restricted their RSS feed — no working public URL found.
  # - name: "De Nederlandsche Bank - Nieuws"
  #   url: "https://www.dnb.nl/rss/nieuws.xml"
  #   category: "official_nl"
  #   language: "nl"

  # --- EU / European ---
  - name: "European Commission - Digital Strategy"
    url: "https://digital-strategy.ec.europa.eu/en/rss.xml"
    category: "official_eu"
    language: "en"

  - name: "European Parliament - News"
    url: "https://www.europarl.europa.eu/rss/doc/top-stories/en.xml"
    category: "official_eu"
    language: "en"

  - name: "Euractiv Technology"
    url: "https://www.euractiv.com/sections/digital/feed/"
    category: "eu_policy"
    language: "en"

  # --- European Startup & VC ---
  - name: "Sifted"
    url: "https://sifted.eu/feed"
    category: "eu_startup_vc"
    language: "en"

  # --- International AI / Research ---
  # OECD AI Observatory feed is blocked/restricted — no working public URL found.
  # - name: "OECD AI Policy Observatory"
  #   url: "https://oecd.ai/en/feed"
  #   category: "ai_policy"
  #   language: "en"

  - name: "MIT Technology Review"
    url: "https://www.technologyreview.com/feed/"
    category: "ai_research"
    language: "en"

  - name: "Stanford HAI"
    url: "https://hai.stanford.edu/news/rss.xml"
    category: "ai_research"
    language: "en"

  # --- Newsletters with web/RSS versions ---
  - name: "The Batch (DeepLearning.AI)"
    url: "https://www.deeplearning.ai/the-batch/feed.xml"
    category: "ai_newsletter"
    language: "en"

  - name: "Import AI (Jack Clark)"
    url: "https://importai.substack.com/feed"
    category: "ai_newsletter"
    language: "en"

# =============================================================================
# SOCIAL MEDIA ACCOUNTS
# Twitter/X accounts are fetched via RSSHub (free, no API key needed).
# RSSHub instance used: rsshub.app — swap to a self-hosted instance for reliability.
# LinkedIn is not supported (no viable free API).
#
# To add an account: add a block with handle, name, and a short relevance_hint.
# To remove: delete or comment out the block.
# =============================================================================

social:
  # rsshub.app no longer serves Twitter/X feeds (redirects to google.com/404).
  # To re-enable social fetching, self-host RSSHub: https://docs.rsshub.app/deploy/
  # Then replace the URL below with your instance (e.g. https://rsshub.yourdomain.com).
  rsshub_instance: "https://rsshub.app"

  twitter_accounts:
    - handle: "alexstubb"
      name: "Alexander Stubb"
      relevance_hint: "EU leadership, AI governance, digital policy"

    - handle: "ylecun"
      name: "Yann LeCun"
      relevance_hint: "AI research, Meta, technical AI debates"

    - handle: "AndrewYNg"
      name: "Andrew Ng"
      relevance_hint: "AI industry, education, startup ecosystem"

    - handle: "GaryMarcus"
      name: "Gary Marcus"
      relevance_hint: "AI critique, policy, safety"

    - handle: "demishassabis"
      name: "Demis Hassabis"
      relevance_hint: "AI research, DeepMind/Google"

    - handle: "sama"
      name: "Sam Altman"
      relevance_hint: "AI industry, OpenAI, regulation views"

# =============================================================================
# OFFICIAL PUBLICATIONS & DATA SOURCES
# These are checked for new documents/reports (web scraping, not RSS).
# =============================================================================

web_sources:
  - name: "CBS Statline - AI / Digitalisering"
    url: "https://www.cbs.nl/nl-nl/zoeken/?q=kunstmatige+intelligentie"
    category: "official_nl_data"
    language: "nl"
    type: "search_page"

  - name: "Rijksoverheid - AI beleid"
    url: "https://www.rijksoverheid.nl/onderwerpen/digitalisering/artifici%C3%ABle-intelligentie-ai"
    category: "official_nl"
    language: "nl"
    type: "topic_page"

  - name: "AIAct.eu - Updates"
    url: "https://artificialintelligenceact.eu/feed/"
    category: "eu_policy"
    language: "en"
    type: "rss"

# =============================================================================
# SERENDIPITY SOURCES
# A curated pool of credible but lower-frequency sources.
# SERENDIPITY_N (default: 3) are randomly sampled each run, giving the briefing
# variety and a chance to surface institutional reports or analysis that wouldn't
# appear in the core feeds. Quality over quantity — only add sources that Stefan
# would trust if they surfaced a Tier 1 item.
# =============================================================================

