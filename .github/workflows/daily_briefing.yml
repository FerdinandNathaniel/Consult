name: Daily Briefing

on:
  schedule:
    # 04:00 UTC = 05:00 CET (winter) / 06:00 CEST (summer)
    # Adjust to 03:00 UTC in summer if you want it reliably before 05:00 local:
    - cron: '0 4 * * *'
  workflow_dispatch:  # Allows manual trigger from the GitHub Actions tab

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt google-api-python-client google-auth

      - name: Run briefing
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-sonnet-4.6' }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          OUTPUT_DIR: outputs
          SERENDIPITY_N: "5"
          INCLUDE_TIER3: "true"
        run: python -m src.briefing.run

      - name: Write Google service account credentials
        # Only runs if the secret is set; secrets context is not usable in `if:`, so the check is done in shell
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            mkdir -p config
            echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > config/google_service_account.json
          fi

      - name: Commit briefing to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p briefings
          cp outputs/briefing_*.md briefings/ 2>/dev/null || true
          git add briefings/
          git diff --staged --quiet || git commit -m "briefing: $(ls outputs/briefing_*.md | head -1 | xargs basename | sed 's/briefing_//;s/\.md//')"
          git push

      - name: Upload briefing as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ github.run_id }}
          path: outputs/briefing_*.md
          retention-days: 90
