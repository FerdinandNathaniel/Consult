# =============================================================================
# REPORT PROFILE — edit this for each new report Stefan works on.
# This profile is fed to the LLM to calibrate what counts as "relevant."
# =============================================================================

report:
  title: "AI-beleid en het startup- en investeringsklimaat in Nederland"
  title_en: "AI Policy and the Startup and Investment Climate in the Netherlands"
  author: "Stefan"
  perspective: "De Nederlandsche Bank (DNB)"
  status: "in_progress"

# What this report is fundamentally about — used as the primary relevance lens.
core_focus: >
  This report examines the intersection of national AI policy and the Dutch startup
  and investment ecosystem, written from the perspective of the Dutch central bank (DNB).
  It covers how AI regulation, public investment, and government strategy shape the
  conditions for AI startups and venture capital in the Netherlands, and how the
  Netherlands compares to peer countries (Germany, France, UK) and EU-level initiatives.

# Key themes — the LLM uses these to tier incoming articles.
themes:
  - AI startups and scale-ups in the Netherlands
  - Venture capital and private investment in Dutch AI
  - Dutch national AI strategy and government programs
  - "DNB perspective on AI: financial stability, supervision, innovation"
  - EU AI Act implementation and its impact on Dutch firms
  - Comparison with Germany, France, UK AI ecosystems
  - Public funding mechanisms (invest-NL, RVO, Horizon Europe)
  - AI talent and skills policy (universities, immigration)
  - AI and productivity / economic impact

# Key organisations and stakeholders to watch.
key_actors:
  - De Nederlandsche Bank (DNB)
  - Ministerie van Economische Zaken
  - Ministerie van Digitalisering
  - European Commission (DG CNECT, DG GROW)
  - InvestNL
  - StartupDelta / Dutch Startup Association
  - CBS (Centraal Bureau voor de Statistiek)
  - OECD
  - ECB (European Central Bank)
  - BIS (Bank for International Settlements)
  - Bruegel

# Relevance tier definitions — used verbatim in the LLM scoring prompt.
# Tier 0 items are excluded from the briefing entirely.
# Tier 3 items are hidden by default (set INCLUDE_TIER3=true to show them).
#
# Calibration note: aim for roughly 3–8 Tier 1/2 articles per day.
# When uncertain between tiers, err on the side of inclusion (higher tier),
# not exclusion. Tier 0 is for clearly irrelevant content only.
relevance_tiers:
  tier_0:
    label: "Exclude"
    description: >
      Clearly irrelevant to this briefing. Use Tier 0 sparingly and only when
      confident: consumer product feature launches (new app UI, platform redesigns)
      with no policy or economic angle; pure entertainment AI applications (AI in
      film, music, gaming) with no industry-level implications; hardware price
      changes; app update notices; and articles so paywalled that no signal can be
      extracted from title and snippet alone. When uncertain whether something is
      Tier 0 or Tier 3, assign Tier 3.

  tier_1:
    label: "Perfectly relevant"
    description: >
      Directly addresses Dutch AI policy, Dutch startup/VC ecosystem, DNB's mandate,
      or EU AI regulation with clear Dutch implications. Stefan should read this today.
      Strong signals: published reports or statements from DNB, ECB, OECD, European
      Commission, CBS, Bruegel, or comparable institutions; government policy
      announcements affecting the Dutch AI ecosystem; regulatory enforcement actions
      or clarifications under the EU AI Act; macro AI investment data for the
      Netherlands or comparable EU economies; significant AI governance developments
      at EU level.

  tier_2:
    label: "Relevant"
    description: >
      Quality journalism or analysis about AI policy, regulation, or the AI investment
      and startup landscape — even if not specifically about the Netherlands. Includes:
      AI policy and regulation developments in EU member states (Germany, France, etc.)
      or at EU level; VC and startup investment trends in European AI; analysis from
      credible think tanks or quality media (Euractiv, MIT Technology Review, Sifted,
      Bruegel, etc.) on AI's economic or regulatory implications; significant AI model
      releases or capability jumps that are generating serious policy or economic
      discussion. Worth a look for framing and context.

  tier_3:
    label: "Low signal"
    description: >
      General AI industry news that may provide background context. Assign Tier 3
      to: AI industry trends from credible news outlets, broader technology policy
      developments, international AI ecosystem news, and research from reputable
      organisations that touches the report's themes only indirectly. This is the
      default tier for "interesting but not urgent." Skim or skip.
