# =============================================================================
# SOCIAL MEDIA ACCOUNTS
# Twitter/X accounts are fetched via RSSHub.
#
# IMPORTANT: rsshub.app no longer serves Twitter/X feeds.
# Self-hosting is required — see docs/setup.md for a one-click Railway deploy.
# Once deployed, set the RSSHUB_INSTANCE secret in GitHub Actions and update
# rsshub_instance below (or keep it in .env for local runs).
#
# LinkedIn is not supported (no viable free API).
# =============================================================================

social:
  rsshub_instance: "https://rsshub.app"  # Replace with self-hosted URL to activate

  twitter_accounts:
    # --- EU leadership & digital policy ---
    - handle: "alexstubb"
      name: "Alexander Stubb"
      relevance_hint: "EU leadership, AI governance, digital policy"

    - handle: "Vestager"
      name: "Margrethe Vestager"
      relevance_hint: "EU digital/competition commissioner, AI regulation architect"

    - handle: "ThierryBreton"
      name: "Thierry Breton"
      relevance_hint: "Former EU digital commissioner, EU AI Act, industrial policy"

    # --- AI research & governance ---
    - handle: "ylecun"
      name: "Yann LeCun"
      relevance_hint: "AI research, Meta, open-source AI debates"

    - handle: "AndrewYNg"
      name: "Andrew Ng"
      relevance_hint: "AI industry, education, startup ecosystem"

    - handle: "GaryMarcus"
      name: "Gary Marcus"
      relevance_hint: "AI critique, policy, safety"

    - handle: "demishassabis"
      name: "Demis Hassabis"
      relevance_hint: "AI research, DeepMind/Google"

    - handle: "sama"
      name: "Sam Altman"
      relevance_hint: "AI industry, OpenAI, regulation views"

    - handle: "BenediktEvans"
      name: "Benedict Evans"
      relevance_hint: "Tech industry analysis, AI impact on business models"

    # --- Economics & finance ---
    - handle: "Schuldensuehner"
      name: "Holger Zschaepitz"
      relevance_hint: "European financial markets, macro economics"

    - handle: "Isabel_Schnabel"
      name: "Isabel Schnabel"
      relevance_hint: "ECB Executive Board, monetary policy, digital finance"

    # --- Dutch ecosystem ---
    - handle: "nlaic"
      name: "NL AI Coalition"
      relevance_hint: "Dutch AI ecosystem, policy, public-private collaboration"

