# =============================================================================
# REPORT PROFILE — edit this for each new report Stefan works on.
# This profile is fed to the LLM to calibrate what counts as "relevant."
# =============================================================================

report:
  title: "AI-beleid en het startup- en investeringsklimaat in Nederland"
  title_en: "AI Policy and the Startup and Investment Climate in the Netherlands"
  author: "Stefan"
  perspective: "Startup Investment & Climate (Netherlands in the regional and global context)"
  status: "in_progress"

# What this report is fundamentally about — used as the primary relevance lens.
core_focus: >
  This report examines the intersection of national AI policy and the Dutch startup
  and investment ecosystem, written from the perspective of start-up investment.
  It covers how AI regulation, public investment, and government strategy shape the
  conditions for AI startups and venture capital in the Netherlands, and how the
  Netherlands compares to peer countries (Germany, France, UK) and EU-level initiatives.

# Key themes — the LLM uses these to tier incoming articles.
themes:
  - AI startups and scale-ups in the Netherlands
  - Venture capital and private investment in Dutch AI
  - Dutch national AI strategy and government programs
  - "Startup investment perspective on AI: market dynamics, funding, innovation"
  - EU AI Act implementation and its impact on Dutch firms
  - Comparison with Germany, France, UK AI ecosystems
  - Public funding mechanisms (invest-NL, RVO, Horizon Europe)
  - AI talent and skills policy (universities, immigration)
  - AI and productivity / economic impact
  - Geopolitical comparison of AI startup investment (USA vs Europe vs China)
  - Cross-border AI capital flows and competitiveness implications for Europe

# Key organisations and stakeholders to watch.
key_actors:
  - De Nederlandsche Bank (DNB)
  - Ministerie van Economische Zaken
  - Ministerie van Digitalisering
  - European Commission (DG CNECT, DG GROW)
  - InvestNL
  - StartupDelta / Dutch Startup Association
  - CBS (Centraal Bureau voor de Statistiek)
  - OECD
  - ECB (European Central Bank)
  - BIS (Bank for International Settlements)
  - Bruegel
  - NVCA (National Venture Capital Association, US)
  - Pitchbook / Dealroom
  - CSET (Center for Security and Emerging Technology)
  - US OSTP (Office of Science and Technology Policy)
  - MIIT (China Ministry of Industry and Information Technology)

# Relevance tier definitions — used verbatim in the LLM scoring prompt.
# Tier 0 items are excluded from the briefing entirely.
# Tier 3 items are hidden by default (set INCLUDE_TIER3=true to show them).
#
# Calibration note: aim for roughly 3–8 Tier 1/2 articles per day.
# When uncertain between tiers, err on the side of inclusion (higher tier),
# not exclusion. Tier 0 is for clearly irrelevant content only.
relevance_tiers:
  tier_0:
    label: "Exclude"
    description: >
      Content with no policy or economic angle. Assign Tier 0 only when confident:
      consumer product feature announcements (new UI, app updates, platform redesigns);
      AI in entertainment (film, music, gaming) with no regulatory or market
      implications; hardware price changes; and items where the title and summary
      together contain no extractable signal (empty, truncated, or fully opaque).
      When uncertain between Tier 0 and Tier 3, assign Tier 3.

  tier_1:
    label: "Perfectly relevant"
    description: >
      Assign Tier 1 when the article directly concerns: (a) Dutch AI policy,
      regulation, or government programmes; (b) the Dutch startup or VC ecosystem;
      (c) DNB's mandate on AI (financial stability, supervision, or innovation);
      (d) EU AI Act enforcement, clarification, or implementation with Dutch or
      industry-wide impact; (e) published data or analysis comparing AI startup
      investment across the USA, Europe, and China from Dealroom, Pitchbook, CSET,
      OECD, or comparable data providers; or (f) official publications from DNB,
      ECB, European Commission, OECD, CBS, BIS, or Bruegel touching these themes.
      Geographic or institutional specificity is the key Tier 1 signal — a credible
      source alone is not sufficient.

  tier_2:
    label: "Relevant"
    description: >
      Assign Tier 2 when the article addresses AI policy, regulation, or startup
      investment at EU level or in peer economies (Germany, France, UK) without
      specific Dutch focus; or when it covers the US or Chinese AI ecosystem
      (government investment, VC trends, industrial policy) in a way that has direct
      comparative relevance to Europe's competitive position. Also Tier 2: analysis
      from Euractiv, Sifted, MIT Technology Review, The Information, or comparable
      outlets on AI's economic or regulatory implications, even without a Dutch angle.
      Distinguish from Tier 1 by the absence of Dutch specificity or primary-source
      institutional data.

  tier_3:
    label: "Low signal"
    description: >
      Assign Tier 3 to general AI industry coverage that touches the report's themes
      only indirectly: AI product launches with potential but unconfirmed policy
      implications; international ecosystem news outside the EU/US/China comparison
      frame; technology research with no clear economic or regulatory angle; and
      background coverage from credible outlets that is broader than the report's
      geographic or thematic scope. Tier 3 is the correct tier for "this might
      eventually matter" — not for clearly irrelevant content (Tier 0) and not for
      content with a clear EU or comparative angle (Tier 2).
